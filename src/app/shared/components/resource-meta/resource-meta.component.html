<div class="fdr-resource-meta">
  <h2 class="fdr-resource-meta__title">Detalhes</h2>

  <dl class="fdr-resource-meta__list">
    <dt>Fluxo</dt>
    <dd><fdr-tag [label]="resource().workflow" /></dd>

    <dt>Tipo de documento</dt>
    <dd><fdr-tag [label]="resource().documentType" /></dd>

    <dt>Dificuldade</dt>
    <dd><fdr-tag [label]="difficultyLabel()" [difficulty]="resource().difficulty" /></dd>

    @if (extentValue()) {
      <dt>{{ extentLabel() }}</dt>
      <dd>{{ extentValue() }}</dd>
    }

    <dt>Atualizado em</dt>
    <dd><fdr-carimbo [label]="resource().updatedAt" /></dd>
  </dl>

  @if (resource().tags.length > 0) {
    <div class="fdr-resource-meta__tags">
      @for (tag of resource().tags; track tag) {
        <fdr-tag [label]="tag" />
      }
    </div>
  }
</div>
