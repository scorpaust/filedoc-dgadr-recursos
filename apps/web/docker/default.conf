# SPA Angular: qualquer rota desconhecida do servidor recua para index.html,
# para o router Angular assumir o controlo (ex.: recarregar /recursos/:slug).
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Não expor a versão do nginx nas respostas/erros.
    server_tokens off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
