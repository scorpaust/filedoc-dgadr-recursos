# Fase 4 (Deployment) — Pipeline de CI/CD (`context/features/db_ci_cd/fase-4-deploy-cicd.md`).
#
# Fluxo de BUILD & PUBLICAÇÃO: só corre ao integrar em `main` (ou ao criar uma tag
# `v*.*.*` sobre um commit de `main`) — nunca a partir de uma pull request, para que
# nenhuma origem externa não confiável tenha acesso aos segredos de publicação (o
# `GITHUB_TOKEN` usado aqui só existe neste contexto de `push`, nunca em `pull_request`).
# Não faz deploy para nenhum ambiente remoto — isso é tratado, de forma controlada, na
# Fase 5. Ver a secção "Imagens de produção (Docker)" do `README.md` para a convenção
# de tags.
name: Publish images

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: build-and-push (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: apps/api/Dockerfile
            image: filedoc-api
          - name: web
            dockerfile: apps/web/Dockerfile
            image: filedoc-web
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Gera sempre a tag do hash curto do commit (imutável e rastreável), mais
      # `latest` em `main` e a versão semântica quando o push é de uma tag `v*.*.*` —
      # nunca publica só com `latest`, porque estas tags saem sempre juntas do mesmo
      # build.
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
