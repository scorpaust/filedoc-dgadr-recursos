services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: filedoc
      POSTGRES_PASSWORD: filedoc
      POSTGRES_DB: filedoc
    ports:
      # 5433 no anfitrião: evita conflito com uma instância nativa de PostgreSQL
      # já a ocupar a porta 5432 por omissão.
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U filedoc -d filedoc']
      interval: 5s
      timeout: 5s
      retries: 5

  # Base de dados efémera para os testes de integração (Fase 2, BD) — isolada da base de
  # dados de desenvolvimento acima, conforme `coding-standards.md` ("Integração: utilizar
  # PostgreSQL isolado"). Sem volume: os dados não sobrevivem a `docker compose down`.
  # Arrancar com: docker compose --profile test up -d postgres-test
  postgres-test:
    image: postgres:16-alpine
    profiles: ['test']
    environment:
      POSTGRES_USER: filedoc_test
      POSTGRES_PASSWORD: filedoc_test
      POSTGRES_DB: filedoc_test
    ports:
      - '5434:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U filedoc_test -d filedoc_test']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
